<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff9ef">
    <title>県かたちスケッチ</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/app-icon.png">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">お題の県を想像で描いて、答え合わせで見比べる</p>
          <h1>県かたちスケッチ</h1>
        </div>
        <button class="icon-button" id="newRoundButton" type="button" aria-label="次のお題">↻</button>
      </header>

      <section class="hero" aria-label="ゲーム紹介">
        <img src="assets/study-banner.png" alt="地理学習ゲームのイラスト">
      </section>

      <section class="challenge" aria-live="polite">
        <div class="prompt">
          <span>お題</span>
          <strong id="prefectureName">読み込み中...</strong>
        </div>
        <div class="score-pill" id="scorePill">未採点</div>
      </section>

      <section class="board-wrap">
        <div class="board" id="board">
          <canvas id="targetCanvas" width="720" height="720" aria-hidden="true"></canvas>
          <canvas id="drawCanvas" width="720" height="720" aria-label="都道府県の形を描くキャンバス"></canvas>
          <div class="start-hint" id="startHint">ここに指で描く</div>
        </div>
      </section>

      <section class="toolbar" aria-label="操作">
        <button class="tool secondary" id="undoButton" type="button">↶ 戻す</button>
        <button class="tool secondary" id="clearButton" type="button">消す</button>
        <button class="tool primary" id="checkButton" type="button">答え合わせ</button>
      </section>

      <section class="result" id="resultPanel" hidden>
        <div class="result-head">
          <div>
            <p class="eyebrow">今回の結果</p>
            <h2 id="resultTitle">採点</h2>
          </div>
          <button class="tool compact" id="nextButton" type="button">次へ</button>
        </div>
        <p id="scoreText" class="score-text"></p>
        <div class="meter" aria-hidden="true"><span id="scoreMeter"></span></div>
        <div class="facts" id="facts"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
